    html,
    body {
      margin: 0;
      background: #050302;
      height: 100%;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .container.has-a-div {
      padding: 0 180px 140px 180px;
      box-sizing: border-box
    }

    .container.hide-vertical {
      padding: 120px 0 120px 0 !important;
      box-sizing: border-box
    }

    * {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .rotate {
      transform: rotate(90deg);
      transform-origin: 28.13% 50%;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: conic-gradient(rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.0), rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 1));
      mask-image: radial-gradient(circle, rgba(0, 0, 0, 0) 58%, rgba(0, 0, 0, 1) 59%);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .input-div {
    height: 3rem;
    position: fixed;
    width: 600px;
    right: 0;
    left: 0;
    margin: auto;
    pointer-events: auto;
    z-index: 99998;
    /*overflow: hidden;*/
}


.input-div:focus-within::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    width: calc(100% + 4px);
    height: calc(100% + 4px);
    border-radius: 1.5rem;
    background: linear-gradient(90deg, #ff8700, #fff0df, #ff8700);
    background-size: 200% 100%;
    animation: borderMarquee 1.5s linear 1.5s;
    pointer-events: none;
    z-index: 1;
    opacity: 0.5;
}

@keyframes borderMarquee {
    0% {
        background-position: 200% 0;
    }
    100% {
        background-position: -200% 0;
    }
}

.input-div_input {
    display: block;
    width: 100%;
    height: 100%;
    outline: none;
    border-radius: 1.5rem;
    padding: 0 6rem 0 1.5rem;
    font-size: 1.4rem;
    box-sizing: border-box;
    position: relative;
    background: rgba(43, 33, 24, 0.82);
    color: #fff;
    z-index: 2;
    opacity: 0.7;
}

.input-div_div {
    position: absolute;
    width: 6rem;
    right: 0;
    bottom: 0;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
}

.input-div_div_button {
    background-color: #ff8700;
    width: 4rem;
    height: 1.8rem;
    border: 0;
    border-radius: 0.9rem;
    opacity: 1;
    cursor: pointer;
}

    .cloud {

      position: absolute;
      background: #fff;
      animation: float 3s ease-in-out infinite alternate;

      content: '';
      position: absolute;
      background: #fff;
      border-radius: 50%;
    }
