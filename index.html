<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
}

.logo {
    width: 360px;
    margin-bottom: 10px;
    margin-top: 120px;
}

.container {
    display: flex;
    gap: 12px;
    padding: 24px;
}

button {
    width: 190px;
    height: 260px;
    border: none;
    border-radius: 10px;
    padding: 0;
    cursor: pointer;
    background-size: cover;
    background-position: center;
    background-color: #333;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}

button:hover {
    transform: scale(1.07);
    z-index: 1;
    box-shadow: 0 8px 28px rgba(0,0,0,0.6);
}

.cloudmoon {
    background-image: url('assets/cloudmoon.png');
}

.ngg {
    background-image: url('assets/ngg.png');
}

.gfnow {
    background-image: url('assets/gfnow.png');
}

.rccngm {
    background-image: url('assets/rccngm.png');
}
</style>
</head>

<body>

<img src="/assets/logo.png" class="logo" alt="Logo">

<div class="container">
    <button class="cloudmoon" onclick="location.href='cloudmoon/'"></button>
    <button class="ngg" onclick="location.href='ngg/'"></button>
    <button class="gfnow" onclick="location.href='gfnow/'"></button>
    <button class="rccngm" onclick="location.href='rccngm/'"></button>
</div>

</body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<script>
VANTA.FOG({
  el: "body",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  midtoneColor: 0xff8700,
  lowlightColor: 0xff3b00,
  baseColor: 0xffffff
})
</script>
</html>
